<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafetyLab | Dr. Yuan-Wei Wu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        html { font-size: 18px; scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFCF8;
            color: #1C1917;
            margin: 0;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-heading { font-family: 'Space Grotesk', sans-serif; }
        .font-serif-tc { font-family: 'Noto Serif TC', serif; }
        
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #FDFCF8;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E7E5E4;
            border-top-color: #B45309;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-hidden {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none;
        }

        /* Dedicated mask class for horizontal fading */
        .mask-horizontal {
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
        }
    </style>

    <script>
        window.process = { env: { API_KEY: "" } };
        window.__appErrors = [];
        window.addEventListener('error', function (e) {
            var msg = '';
            if (e && e.message) { msg = e.message; }
            if (e && e.filename) { msg += '  @ ' + e.filename; }
            if (e && e.target && e.target.src) { msg = 'Failed to load: ' + e.target.src; }
            if (msg) { window.__appErrors.push(msg); }
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
            var r = e && e.reason ? (e.reason.message || String(e.reason)) : 'unknown';
            window.__appErrors.push('Promise rejected: ' + r);
        });
        window.hideAppLoader = function () {
            var loader = document.getElementById('loader');
            if (loader) loader.classList.add('loader-hidden');
        };
        // Safety net: if the app has not mounted after 9s, stop the spinner and
        // show what actually went wrong instead of leaving the user stuck.
        window.setTimeout(function () {
            var root = document.getElementById('root');
            if (!root || root.childElementCount > 0) return;
            window.hideAppLoader();
            var detail = '';
            if (window.__appErrors.length) {
                var text = window.__appErrors.join('\n').replace(/&/g, '&amp;').replace(/</g, '&lt;');
                detail = '<pre style="text-align:left;white-space:pre-wrap;word-break:break-word;background:#F5F5F4;border:1px solid #E7E5E4;border-radius:8px;padding:12px;margin:14px auto 0;max-width:600px;font-size:11px;color:#78716C;line-height:1.5;">' + text + '</pre>';
            }
            root.innerHTML = '<div style="max-width:680px;margin:16vh auto;padding:0 24px;text-align:center;font-family:Inter,sans-serif;color:#57534E;">'
                + '<p style="font-size:15px;line-height:1.7;">頁面載入時間過長或失敗。請點下方按鈕重新整理。</p>'
                + '<p style="font-size:13px;color:#A8A29E;margin-top:8px;">Page failed to load. Please reload, or open directly in Safari / Chrome.</p>'
                + detail
                + '<button onclick="location.reload()" style="margin-top:18px;padding:10px 22px;border:none;border-radius:999px;background:#B45309;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">重新整理 / Reload</button>'
                + '</div>';
        }, 9000);
    </script>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-family: 'Space Grotesk', sans-serif; font-size: 11px; letter-spacing: 0.2em; color: #A8A29E; text-transform: uppercase; font-weight: bold;">SafetyLab Initializing</p>
    </div>
    
    <div id="root"></div>
    <!-- App bundled locally (React 19 + components). No external module CDN / in-browser transpile. -->
    <script src="./app.js"></script>
</body>
</html>
